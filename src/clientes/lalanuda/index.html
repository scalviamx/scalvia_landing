    /* ============================================================
       UTILS
       ============================================================ */
    function priceForService(petType, sizeId, serviceId) {
      const size = sizeOptions[petType]?.find(s => s.id === sizeId);
      const svc = services[petType]?.find(s => s.id === serviceId);
      if (!size || !svc) return svc?.basePrice || 0;
      return Math.round(svc.basePrice * size.multiplier);
    }
    function calculateTotal(petType, sizeId, ids) {
      if (!petType || !sizeId) return 0;
      return ids.reduce((t, id) => t + priceForService(petType, sizeId, id), 0);
    }
    function formatMXN(n) {
      return new Intl.NumberFormat('es-MX', { style:'currency', currency:'MXN', maximumFractionDigits:0 }).format(n);
    }
    /* ============================================================
       NOTIFICACIONES
       ============================================================
       Genera DOS mensajes para dos destinatarios distintos:

       - WhatsApp → al equipo del salón. Info operativa para preparar
         la cita: cliente, mascota, servicios, hora, notas.

       - Email    → al admin de la plataforma (tú, el revendedor).
         Cada email es el registro facturable de la cita al cliente
         final (el salón). Incluye un ID único y timestamp.

       En producción, ambos canales los dispara el backend usando
       APIs de WhatsApp Business (Twilio/360dialog) y un servicio
       de correo transaccional (Resend/SendGrid). Acá usamos wa.me/
       y mailto: como simulación.
       ============================================================ */
    function buildNotifications(booking, user) {
      const payment = PAYMENT_METHODS.find(p => p.id === booking.paymentMethod);
      const paymentLine = payment ? `${payment.title} (${payment.status})` : 'No especificado';

      const fields = [
        ['Cliente',        `${user?.name || 'Invitado'}${user?.email ? ' (' + user.email + ')' : ''}`],
        ['Mascota',        `${booking.petName || '—'} · ${booking.petType === 'perro' ? 'Perro' : 'Gato'} · ${booking.breed}`],
        ['Tamaño',         `${booking.sizeLabel} (${booking.sizeRange})`],
        ['Fecha',          booking.date || 'Por confirmar'],
        ['Método de pago', paymentLine],
        ['Notas',          booking.notes || '—'],
      ];

      // ----- Mensaje para WhatsApp (al salón) -----
      const waLines = [
        `*Nueva cita — ${company.name}*`,
        ``,
        ...fields.map(([k, v]) => `*${k}:* ${v}`),
        ``,
        `*Servicios:*`,
        ...booking.items.map(it => `• ${it.name} — $${it.price}`),
        ``,
        `*Total: $${booking.total} MXN*`,
      ];
      const waText = waLines.join('\n');
      const waUrl = `https://wa.me/${company.salonStaffWhatsapp}?text=${encodeURIComponent(waText)}`;

      // ----- Mensaje para email (al admin de la plataforma — registro facturable) -----
      const emailLines = [
        `Nueva cita agendada en ${company.name}.`,
        ``,
        `Este registro corresponde a un servicio facturable al cliente final.`,
        ``,
        '— DETALLES DE LA CITA —',
        ``,
        ...fields.map(([k, v]) => `${k}: ${v}`),
        ``,
        'Servicios:',
        ...booking.items.map(it => `  • ${it.name} — $${it.price} (${it.duration} min)`),
        ``,
        `Total: $${booking.total} MXN`,
        ``,
        `— REGISTRO —`,
        `ID de cita: ${booking.bookingId || 'N/A'}`,
        `Generado:   ${new Date().toLocaleString('es-MX')}`,
      ];
      const emailText = emailLines.join('\n');
      const subject = `[Facturable] Cita ${booking.bookingId || ''} · ${company.name} — ${booking.petName || 'Mascota'}`;
      const mailtoUrl = `mailto:${company.platformAdminEmail}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(emailText)}`;

      return { waText, emailText, waUrl, mailtoUrl };

    /* ============================================================
       MOTOR DE CITAS — fechas, horarios, conflictos
       ============================================================ */
    const SLOT_INTERVAL_MIN = 30;       // granularidad de horarios disponibles
    const MIN_ADVANCE_MIN = 24 * 60;    // anticipación mínima: 24 horas
    const BOOKINGS_KEY = 'll_bookings_v1';
    const DAY_NAMES = ['Dom', 'Lun', 'Mar', 'Mié', 'Jue', 'Vie', 'Sáb'];
    const MONTH_NAMES = ['ene', 'feb', 'mar', 'abr', 'may', 'jun', 'jul', 'ago', 'sep', 'oct', 'nov', 'dic'];

    function pad2(n) { return n.toString().padStart(2, '0'); }
    function toISODate(d) { return d.getFullYear() + '-' + pad2(d.getMonth()+1) + '-' + pad2(d.getDate()); }
    function fromISODate(s) { const [y,m,d] = s.split('-').map(Number); return new Date(y, m-1, d); }
    function sameDay(a, b) { return a.getFullYear()===b.getFullYear() && a.getMonth()===b.getMonth() && a.getDate()===b.getDate(); }
    function minToHHMM(m) { return pad2(Math.floor(m/60)) + ':' + pad2(m%60); }
    function parseHHMM(s) { const [h, m] = s.split(':').map(Number); return h*60 + (m||0); }

    function formatDayLabel(d) {
      const today = new Date(); today.setHours(0,0,0,0);
      if (sameDay(d, today)) return 'Hoy';
      const tomorrow = new Date(today); tomorrow.setDate(today.getDate() + 1);
      if (sameDay(d, tomorrow)) return 'Mañana';
      return DAY_NAMES[d.getDay()];
    }

    function formatLongDate(isoStr) {
      const d = fromISODate(isoStr);
      return `${DAY_NAMES[d.getDay()]} ${d.getDate()} de ${MONTH_NAMES[d.getMonth()]}`;
    }

    // Suma la duración (en min) de todos los servicios seleccionados.
    function totalDuration(petType, ids) {
      if (!petType) return 0;
      return ids.reduce((t, id) => {
        const svc = services[petType].find(s => s.id === id);
        return t + (svc?.duration || 0);
      }, 0);
    }

    // Genera todos los horarios disponibles en un día (en minutos desde medianoche)
    // donde un servicio con la duración dada cabría dentro del horario de operación.
    // Respeta también la anticipación mínima MIN_ADVANCE_MIN (24h por defecto).
    function generateSlots(date, durationMin) {
      if (!durationMin) return [];
      const hours = company.businessHours[date.getDay()];
      if (!hours) return [];
      const openMin = parseHHMM(hours.open);
      const closeMin = parseHHMM(hours.close);
      const lastStart = closeMin - durationMin;
      if (lastStart < openMin) return [];

      const now = new Date();

      const slots = [];
      for (let m = openMin; m <= lastStart; m += SLOT_INTERVAL_MIN) {
        // Construye el Date completo del slot y compara contra "ahora"
        const slotDate = new Date(date);
        slotDate.setHours(Math.floor(m / 60), m % 60, 0, 0);
        const diffMin = (slotDate - now) / 60000;
        if (diffMin < MIN_ADVANCE_MIN) continue;
        slots.push(m);
      }
      return slots;
    }

    // ¿Está disponible este slot? (no se traslapa con citas existentes)
    function isSlotAvailable(dateStr, startMin, durationMin, bookings) {
      const endMin = startMin + durationMin;
      return !bookings.some(b => {
        if (b.date !== dateStr) return false;
        const bEnd = b.startMin + b.durationMin;
        // hay traslape si startMin < bEnd && endMin > b.startMin
        return startMin < bEnd && endMin > b.startMin;
      });
    }

    function loadBookings() {
      try { return JSON.parse(localStorage.getItem(BOOKINGS_KEY) || '[]'); } catch { return []; }
    }
    function saveBookingToStorage(booking) {
      const all = loadBookings();
      all.push(booking);
      localStorage.setItem(BOOKINGS_KEY, JSON.stringify(all));
    }

    // Pre-carga algunas citas demo para que el usuario vea el bloqueo en acción.
    // Si todas las citas guardadas son del pasado, limpia y vuelve a sembrar.
    function seedDemoBookings() {
      const today = toISODate(new Date());
      const existing = loadBookings();
      const future = existing.filter(b => b.date >= today);
      if (future.length > 0) {
        // hay citas futuras válidas; solo limpiamos las del pasado
        if (future.length !== existing.length) localStorage.setItem(BOOKINGS_KEY, JSON.stringify(future));
        return;
      }
      // sembrar citas demo en los próximos días hábiles
      const businessDays = [];
      const d = new Date(); d.setHours(0,0,0,0);
      for (let i = 1; businessDays.length < 5 && i < 21; i++) {
        const nd = new Date(d); nd.setDate(d.getDate() + i);
        if (company.businessHours[nd.getDay()]) businessDays.push(nd);
      }
      const demoSlots = [
        { startMin: 10*60,     durationMin: 90 },
        { startMin: 15*60+30,  durationMin: 60 },
        { startMin: 11*60+30,  durationMin: 75 },
        { startMin: 9*60,      durationMin: 120 },
        { startMin: 13*60,     durationMin: 45 },
      ];
      const seeds = businessDays.map((bd, i) => ({
        id: 'demo_' + i,
        date: toISODate(bd),
        ...demoSlots[i],
        demo: true,
      }));
      localStorage.setItem(BOOKINGS_KEY, JSON.stringify(seeds));
    }

          <div className="grid grid-cols-2 gap-4 mb-10">
            {[

    function BreedSizeStep({ booking, patch }) {
      const petBreeds = breeds[booking.petType] || [];

      return (
        <div>
          <h2 className="font-display text-4xl md:text-5xl tracking-tight mb-3">Cuéntanos de {booking.petName || 'tu mascota'}.</h2>

                <option value="">Selecciona una raza</option>
                {petBreeds.map(b => <option key={b} value={b}>{b}</option>)}

                <button key={s.id} onClick={() => patch({ sizeId: s.id })} className={`w-full flex items-center justify-between px-5 py-4 rounded-2xl border transition-all text-left ${booking.sizeId === s.id ? 'border-ink bg-ink text-cream' : 'border-ink/15 hover:border-ink/40 bg-soft'}`}>
                  <div>
                    <div className="font-medium">{s.label}</div>

                </button>
              ))}
            </div>
          </div>
        </div>

    function ServicesStep({ booking, patch }) {
      const available = services[booking.petType] || [];
      const selected = new Set(booking.selectedServiceIds);
      function toggle(id) {
        if (selected.has(id)) patch({ selectedServiceIds: booking.selectedServiceIds.filter(x => x !== id) });
        else patch({ selectedServiceIds: [...booking.selectedServiceIds, id] });
      }
      return (
        <div>
          <h2 className="font-display text-4xl md:text-5xl tracking-tight mb-3">Elige los servicios.</h2>
          <p className="text-ink/65 mb-10">Puedes seleccionar más de uno. Los precios se ajustan al tamaño.</p>
          <div className="space-y-3">
            {available.map(svc => {
              const price = priceForService(booking.petType, booking.sizeId, svc.id);
              const isSel = selected.has(svc.id);
              return (
                <button key={svc.id} onClick={() => toggle(svc.id)} className={`w-full text-left px-5 py-4 md:p-5 rounded-2xl border transition-all flex items-start gap-4 ${isSel ? 'border-ink bg-ink text-cream' : 'border-ink/15 hover:border-ink/40 bg-soft'}`}>
                  <div className={`w-6 h-6 rounded-full border-2 flex items-center justify-center mt-0.5 shrink-0 transition-colors ${isSel ? 'border-cream bg-cream text-ink' : 'border-ink/30'}`}>
                    {isSel && <I.Check className="w-3.5 h-3.5" strokeWidth={3}/>}
                  </div>
                  <div className="flex-1 min-w-0">
                    <div className="flex items-center justify-between gap-3">
                      <div className="font-medium">{svc.name}</div>
                      <div className="font-display text-lg shrink-0 tabular-nums">{formatMXN(price)}</div>
                    </div>
                    <div className={`text-sm mt-1 ${isSel ? 'text-cream/70' : 'text-ink/60'}`}>{svc.description}</div>
                    <div className={`text-xs mt-1 ${isSel ? 'text-cream/55' : 'text-ink/45'}`}>≈ {svc.duration} min</div>
                  </div>
                </button>
              );
            })}
          </div>
        </div>
      );
    }

    function DateTimePicker({ durationMin, value, onChange, bookings }) {
      const [selectedDate, setSelectedDate] = useState(value ? fromISODate(value.date) : null);

      // Próximos 30 días
      const days = useMemo(() => {
        const arr = [];
        const today = new Date(); today.setHours(0,0,0,0);
        for (let i = 0; i < 30; i++) {
          const d = new Date(today); d.setDate(today.getDate() + i);
          arr.push(d);
        }
        return arr;
      }, []);

      const slots = useMemo(() => {
        if (!selectedDate || !durationMin) return [];
        return generateSlots(selectedDate, durationMin);
      }, [selectedDate, durationMin]);

      // Si la duración cambia y el slot guardado ya no es válido, lo limpiamos.
      useEffect(() => {
        if (!value || !durationMin) return;
        const d = fromISODate(value.date);
        const validSlots = generateSlots(d, durationMin);
        const ok = validSlots.includes(value.startMin) && isSlotAvailable(value.date, value.startMin, durationMin, bookings);
        if (!ok) onChange(null);
      }, [durationMin]);

      if (!durationMin) {
        return (
          <div className="bg-soft border border-ink/10 rounded-2xl p-5 text-sm text-ink/55 italic text-center">
            Selecciona al menos un servicio para ver los horarios disponibles.
          </div>
        );
      }

      const todayStr = toISODate(new Date());

      return (
        <div>
          {/* Carrusel de fechas */}
          <div className="text-[10px] uppercase tracking-[0.18em] text-warmbrown mb-3">Fecha</div>
          <div className="flex gap-2 overflow-x-auto pb-3 -mx-5 px-5 md:mx-0 md:px-0 snap-x">
            {days.map(d => {
              const dateStr = toISODate(d);
              const isOpen = !!company.businessHours[d.getDay()];
              const isSelected = selectedDate && sameDay(d, selectedDate);
              // ¿el día tiene al menos un slot disponible?
              const daySlots = isOpen ? generateSlots(d, durationMin) : [];
              const hasAvailability = daySlots.some(s => isSlotAvailable(dateStr, s, durationMin, bookings));
              const disabled = !isOpen || !hasAvailability;
              const isClosed = !isOpen;
              return (
                <button
                  key={dateStr}
                  type="button"
                  disabled={disabled}
                  onClick={() => setSelectedDate(d)}
                  className={`shrink-0 snap-start w-[72px] py-3 rounded-2xl border-2 text-center transition-all ${
                    isSelected
                      ? 'bg-ink text-cream border-ink'
                      : disabled
                        ? 'opacity-30 cursor-not-allowed border-ink/10 bg-soft'
                        : 'border-ink/10 hover:border-ink/40 bg-soft'
                  }`}
                  title={isClosed ? 'Cerrado' : !hasAvailability ? 'Sin disponibilidad' : ''}
                >
                  <div className={`text-[10px] uppercase tracking-widest mb-1 ${isSelected ? 'text-cream/70' : 'text-ink/55'}`}>
                    {formatDayLabel(d)}
                  </div>
                  <div className="font-display text-2xl leading-none">{d.getDate()}</div>
                  <div className={`text-[10px] uppercase tracking-widest mt-1 ${isSelected ? 'text-cream/70' : 'text-ink/45'}`}>
                    {MONTH_NAMES[d.getMonth()]}
                  </div>
                </button>
              );
            })}
          </div>

          {/* Grid de horarios */}
          {selectedDate && (
            <div className="mt-8 animate-fade-up">
              <div className="flex items-baseline justify-between mb-3">
                <div className="text-[10px] uppercase tracking-[0.18em] text-warmbrown">Hora</div>
                <div className="text-[10px] uppercase tracking-widest text-ink/45">~{durationMin} min de servicio</div>
              </div>
              {slots.length === 0 ? (
                <div className="bg-soft border border-ink/10 rounded-2xl p-5 text-sm text-ink/55 italic text-center">
                  No hay horarios disponibles ese día.
                </div>
              ) : (
                <div className="grid grid-cols-3 sm:grid-cols-4 md:grid-cols-5 gap-2">
                  {slots.map(startMin => {
                    const dateStr = toISODate(selectedDate);
                    const available = isSlotAvailable(dateStr, startMin, durationMin, bookings);
                    const isSel = value && value.date === dateStr && value.startMin === startMin;
                    return (
                      <button
                        key={startMin}
                        type="button"
                        disabled={!available}
                        onClick={() => onChange({ date: dateStr, startMin })}
                        className={`py-3 rounded-xl border-2 text-sm font-medium tabular-nums transition-all flex items-center justify-center gap-1.5 ${
                          isSel
                            ? 'bg-ink text-cream border-ink'
                            : !available
                              ? 'border-ink/5 bg-ink/5 text-ink/30 cursor-not-allowed'
                              : 'border-ink/10 hover:border-ink hover:bg-soft bg-soft'
                        }`}
                      >
                        {!available && <I.Lock className="w-3 h-3"/>}
                        {minToHHMM(startMin)}
                      </button>
                    );
                  })}
                </div>
              )}
              {slots.length > 0 && (
                <div className="text-[11px] text-ink/45 mt-3 flex items-center gap-1.5">
                  <I.Lock className="w-3 h-3"/> Las horas con candado ya están reservadas.
                </div>
              )}
            </div>
          )}

          {/* Confirmación de slot seleccionado */}
          {value && (
            <div className="mt-6 bg-ink text-cream rounded-2xl p-4 text-sm flex items-start gap-3 animate-fade-up">
              <I.Check className="w-4 h-4 shrink-0 mt-0.5 text-terracotta"/>
              <div>
                <div className="font-medium">{formatLongDate(value.date)} a las {minToHHMM(value.startMin)}</div>
                <div className="text-cream/65 text-xs mt-0.5">Termina aprox. {minToHHMM(value.startMin + durationMin)} · {durationMin} min</div>
              </div>
            </div>
          )}
        </div>
      );
    }

    function SummaryStep({ booking, patch, user, onConfirmed }) {
      const [stage, setStage] = useState('review');
      const [existingBookings, setExistingBookings] = useState(loadBookings());

      const size = sizeOptions[booking.petType]?.find(s => s.id === booking.sizeId);
      const items = booking.selectedServiceIds.map(id => {
        const svc = services[booking.petType].find(s => s.id === id);
        return { id, name: svc.name, price: priceForService(booking.petType, booking.sizeId, id), duration: svc.duration };
      });
      const total = items.reduce((t, it) => t + it.price, 0);
      const durationMin = totalDuration(booking.petType, booking.selectedServiceIds);

      const dateLabel = booking.slot
        ? `${formatLongDate(booking.slot.date)} · ${minToHHMM(booking.slot.startMin)} – ${minToHHMM(booking.slot.startMin + durationMin)}`
        : '';

      const selectedPayment = PAYMENT_METHODS.find(p => p.id === booking.paymentMethod);

      function handlePay() {
        setStage('paying');
        setTimeout(() => setStage('paid'), 1200);
      }

      function handleConfirm() {
        // 1. ID único para la cita — lo usamos como referencia de facturación
        const bookingId = 'b_' + Date.now();

        // 2. Persistir la cita ANTES de abrir links — el slot queda bloqueado
        const newBooking = {
          id: bookingId,
          date: booking.slot.date,
          startMin: booking.slot.startMin,
          durationMin,
          petName: booking.petName,
          petType: booking.petType,
          breed: booking.breed,
          total,
          services: items.map(it => it.name),
          paymentMethod: booking.paymentMethod,
          user: user?.name || 'Invitado',
          createdAt: new Date().toISOString(),
        };
        saveBookingToStorage(newBooking);
        setExistingBookings(loadBookings());

        // 3. Generar mensajes (uno para salón, uno para admin)
        const notif = buildNotifications({
          ...booking,
          bookingId,
          date: dateLabel,
          sizeLabel: size?.label || '',
          sizeRange: size?.range || '',
          items, total,
        }, user);

        // 4. WhatsApp → equipo del salón (info operativa)
        window.open(notif.waUrl, '_blank');
        // 5. Email → admin de la plataforma (registro facturable)
        setTimeout(() => { window.location.href = notif.mailtoUrl; setStage('confirmed'); }, 500);
      }

      if (stage === 'confirmed') return (
        <div className="text-center py-12 animate-fade-up">
          <div className="w-20 h-20 rounded-full bg-ink text-cream flex items-center justify-center mx-auto mb-6">
            <I.Check className="w-10 h-10" strokeWidth={2.4}/>
          </div>
          <h2 className="font-display text-4xl md:text-5xl tracking-tight mb-4">¡Cita agendada!</h2>
          <div className="bg-soft border border-ink/10 rounded-2xl p-5 max-w-md mx-auto mb-8 text-left">
            <div className="text-[10px] uppercase tracking-widest text-ink/55 mb-2">Tu cita</div>
            <div className="font-display text-xl leading-tight">{dateLabel}</div>
            <div className="text-sm text-ink/60 mt-1">{booking.petName} · {items.length} {items.length === 1 ? 'servicio' : 'servicios'} · {formatMXN(total)}</div>
            {selectedPayment && (
              <div className="text-xs text-ink/55 mt-3 pt-3 border-t border-ink/10 flex items-center gap-1.5">
                <I.CreditCard className="w-3.5 h-3.5"/>
                {selectedPayment.title}
                <span className={`ml-auto px-2 py-0.5 rounded-full text-[10px] uppercase tracking-wider ${
                  selectedPayment.status === 'pagado' ? 'bg-ink text-cream' : 'bg-terracotta/15 text-terracotta'
                }`}>
                  {selectedPayment.status}
                </span>
              </div>
            )}
          </div>
          <p className="text-ink/65 max-w-md mx-auto mb-10">
            {booking.paymentMethod === 'online'
              ? 'Recibirás un mensaje de confirmación. El horario quedó bloqueado para otras citas.'
              : 'Recibirás un mensaje de confirmación. Recuerda llevar tu forma de pago al llegar.'}
          </p>
          <button onClick={onConfirmed} className="bg-ink text-cream px-7 py-3.5 rounded-full hover:bg-terracotta transition-colors">Volver al inicio</button>
        </div>
      );

      return (
        <div>
          <h2 className="font-display text-4xl md:text-5xl tracking-tight mb-3">Revisa tu cita.</h2>
          <p className="text-ink/65 mb-10">Elige cuándo quieres venir, cómo pagas, y confirmamos.</p>

          {/* Resumen */}
          <div className="bg-soft rounded-3xl p-6 md:p-8 border border-ink/10 space-y-5">
            <div className="flex justify-between gap-4 items-baseline">
              <span className="text-[10px] uppercase tracking-widest text-ink/55 shrink-0 pt-1">Mascota</span>
              <span className="text-right">{booking.petName} · {booking.petType === 'perro' ? 'Perro' : 'Gato'} · {booking.breed}</span>
            </div>
            <div className="flex justify-between gap-4 items-baseline">
              <span className="text-[10px] uppercase tracking-widest text-ink/55 shrink-0 pt-1">Tamaño</span>
              <span className="text-right">{size?.label} ({size?.range})</span>
            </div>
            <div>
              <div className="flex justify-between items-baseline mb-3">
                <span className="text-[10px] uppercase tracking-widest text-ink/55">Servicios</span>
                <span className="text-[10px] uppercase tracking-widest text-ink/55 tabular-nums">~{durationMin} min</span>
              </div>
              <div className="space-y-2">
                {items.map(it => (
                  <div key={it.id} className="flex justify-between gap-3 border-b border-ink/10 pb-2 last:border-0 last:pb-0">
                    <span>{it.name} <span className="text-ink/45 text-xs ml-1 tabular-nums">{it.duration} min</span></span>
                    <span className="tabular-nums shrink-0">{formatMXN(it.price)}</span>
                  </div>
                ))}
              </div>
            </div>
            <div className="flex justify-between items-baseline pt-4 border-t border-ink/15">
              <span className="text-xs uppercase tracking-widest text-ink/55">Total</span>
              <span className="font-display text-4xl tabular-nums">{formatMXN(total)}</span>
            </div>
          </div>

          {/* Fecha y hora */}
          <div className="mt-10">
            <div className="flex items-baseline justify-between mb-5 flex-wrap gap-2">
              <h3 className="font-display text-2xl tracking-tight flex items-center gap-2">
                <I.Calendar className="w-5 h-5 text-terracotta"/>
                Fecha y hora
              </h3>
              <span className="text-xs text-ink/55">Reservas con 24h de anticipación</span>
            </div>
            <DateTimePicker
              durationMin={durationMin}
              value={booking.slot}
              onChange={slot => patch({ slot })}
              bookings={existingBookings}
            />
          </div>

          {/* Notas */}
          <div className="mt-8">
            <label className="block text-xs uppercase tracking-[0.18em] text-warmbrown mb-2">Notas para el estilista (opcional)</label>
            <textarea rows={3} value={booking.notes} onChange={e => patch({ notes: e.target.value })} placeholder="Ej. Es nervioso con la secadora, prefiere música tranquila..." className="w-full bg-soft border border-ink/10 rounded-2xl px-5 py-4 focus:outline-none focus:border-ink resize-none"/>
          </div>

          {/* Método de pago */}
          <div className="mt-10">
            <h3 className="font-display text-2xl tracking-tight flex items-center gap-2 mb-5">
              <I.CreditCard className="w-5 h-5 text-terracotta"/>
              Método de pago
            </h3>
            <div className="space-y-2">
              {PAYMENT_METHODS.map(pm => {
                const PmIcon = I[pm.Icon] || I.CreditCard;
                const isSel = booking.paymentMethod === pm.id;
                const locked = stage !== 'review';
                return (
                  <button
                    key={pm.id}
                    type="button"
                    disabled={locked}
                    onClick={() => patch({ paymentMethod: pm.id })}
                    className={`w-full text-left px-5 py-4 rounded-2xl border-2 transition-all flex items-start gap-4 ${
                      isSel ? 'border-ink bg-ink text-cream' : 'border-ink/10 hover:border-ink/40 bg-soft'
                    } ${locked ? 'opacity-60 cursor-not-allowed' : ''}`}
                  >
                    <div className={`w-6 h-6 rounded-full border-2 flex items-center justify-center mt-0.5 shrink-0 transition-colors ${
                      isSel ? 'border-cream bg-cream text-ink' : 'border-ink/30'
                    }`}>
                      {isSel && <I.Check className="w-3.5 h-3.5" strokeWidth={3}/>}
                    </div>
                    <PmIcon className={`w-5 h-5 mt-0.5 shrink-0 ${isSel ? 'text-cream' : 'text-terracotta'}`}/>
                    <div className="flex-1 min-w-0">
                      <div className="font-medium">{pm.title}</div>
                      <div className={`text-sm mt-0.5 ${isSel ? 'text-cream/70' : 'text-ink/60'}`}>
                        {pm.desc}
                      </div>
                    </div>
                  </button>
                );
              })}
            </div>
          </div>

          {/* Acción principal — depende del método de pago seleccionado */}
          {stage === 'review' && (() => {
            const noSlot = !booking.slot;
            const noPayment = !booking.paymentMethod;
            if (noSlot || noPayment) {
              return (
                <button disabled className="mt-10 w-full bg-ink text-cream py-4 rounded-full inline-flex items-center justify-center gap-2 disabled:opacity-30 disabled:cursor-not-allowed">
                  {noSlot ? 'Selecciona fecha y hora' : 'Selecciona método de pago'}
                </button>
              );
            }
            if (booking.paymentMethod === 'online') {
              return (
                <button onClick={handlePay} className="mt-10 w-full bg-ink text-cream py-4 rounded-full inline-flex items-center justify-center gap-2 hover:bg-terracotta transition-colors">
                  <I.CreditCard className="w-4 h-4"/>
                  Pagar {formatMXN(total)} en línea
                </button>
              );
            }
            const tail = booking.paymentMethod === 'cash_on_site' ? 'Pagar en efectivo al llegar' : 'Pagar con tarjeta al llegar';
            return (
              <button onClick={handleConfirm} className="mt-10 w-full bg-ink text-cream py-4 rounded-full inline-flex items-center justify-center gap-2 hover:bg-terracotta transition-colors">
                <I.Check className="w-4 h-4"/>
                Confirmar cita · {tail}
              </button>
            );
          })()}
          {stage === 'paying' && (
            <button disabled className="mt-10 w-full bg-ink/60 text-cream py-4 rounded-full inline-flex items-center justify-center gap-2 cursor-wait">
              <span className="inline-block animate-spin"><I.Loader className="w-4 h-4"/></span> Procesando pago...
            </button>
          )}
          {stage === 'paid' && (
            <div className="mt-10 space-y-4 animate-fade-up">
              <div className="bg-ink/5 rounded-2xl p-5 flex items-start gap-3">
                <I.Check className="w-5 h-5 text-terracotta shrink-0 mt-0.5"/>
                <div className="text-sm">
                  <div className="font-medium">Pago recibido (simulado)</div>
                  <div className="text-ink/60 text-xs mt-0.5">En producción esto se valida con el webhook de MercadoPago / Stripe.</div>
                </div>
              </div>
              <button onClick={handleConfirm} className="w-full bg-ink text-cream py-4 rounded-full inline-flex items-center justify-center gap-2 hover:bg-terracotta transition-colors">
                <I.MessageCircle className="w-4 h-4"/> Confirmar y notificar al equipo
              </button>
              <p className="text-xs text-ink/50 text-center max-w-sm mx-auto">Se abrirá WhatsApp (para el salón) y tu cliente de correo (para el administrador) con los mensajes pre-rellenados.</p>
            </div>
          )}
        </div>
      );
    }

    function BookingFlow({ user, onDone, onCancel }) {
      const STEPS = [
        { id: 'pet', label: 'Mascota' },
        { id: 'breed', label: 'Raza y tamaño' },
        { id: 'services', label: 'Servicios' },
        { id: 'summary', label: 'Resumen' },
      ];
      const [stepIdx, setStepIdx] = useState(0);
      const [booking, setBooking] = useState({ petType: null, petName: '', breed: '', sizeId: null, selectedServiceIds: [], slot: null, notes: '', paymentMethod: null });
      const total = calculateTotal(booking.petType, booking.sizeId, booking.selectedServiceIds);
      const duration = totalDuration(booking.petType, booking.selectedServiceIds);
      function patch(u) { setBooking(b => ({ ...b, ...u })); }
      function back() { if (stepIdx === 0) onCancel(); else setStepIdx(i => i - 1); }
      const canAdvance = (() => {
        if (stepIdx === 0) return !!booking.petType && !!booking.petName.trim();
        if (stepIdx === 1) return !!booking.breed && !!booking.sizeId;
        if (stepIdx === 2) return booking.selectedServiceIds.length > 0;
        return true;
      })();
      const isLast = stepIdx === STEPS.length - 1;
      return (
        <main className="max-w-3xl mx-auto px-5 md:px-8 py-8 md:py-12 pb-32">
          <div className="flex items-center gap-2 mb-8">
            <button onClick={back} className="p-2 -ml-2 rounded-full hover:bg-ink/5"><I.ArrowLeft className="w-5 h-5"/></button>
            <button onClick={onCancel} className="ml-auto p-2 -mr-2 rounded-full hover:bg-ink/5"><I.X className="w-5 h-5"/></button>
          </div>
          <div className="flex items-center gap-1.5 mb-3">
            {STEPS.map((s, i) => <div key={s.id} className={`h-1 flex-1 rounded-full transition-colors duration-500 ${i <= stepIdx ? 'bg-ink' : 'bg-ink/15'}`}/>)}
          </div>
          <div className="text-xs uppercase tracking-[0.25em] text-warmbrown mb-10">Paso {stepIdx + 1} de {STEPS.length} · {STEPS[stepIdx].label}</div>
          <div className="animate-fade-up" key={stepIdx}>
            {stepIdx === 0 && <PetTypeStep booking={booking} patch={patch}/>}
            {stepIdx === 1 && <BreedSizeStep booking={booking} patch={patch}/>}
            {stepIdx === 2 && <ServicesStep booking={booking} patch={patch}/>}
            {stepIdx === 3 && <SummaryStep booking={booking} patch={patch} user={user} onConfirmed={onDone}/>}
          </div>
          {!isLast && (
            <div className="fixed bottom-0 left-0 right-0 bg-cream/95 backdrop-blur-md border-t border-ink/10 z-20">
              <div className="max-w-3xl mx-auto px-5 md:px-8 py-4 flex items-center justify-between">
                <div>
                  <div className="text-[10px] uppercase tracking-widest text-ink/55">
                    Total estimado{duration > 0 ? ` · ~${duration} min` : ''}
                  </div>
                  <div className="font-display text-2xl">{formatMXN(total)}</div>
                </div>
                <button disabled={!canAdvance} onClick={() => setStepIdx(i => i + 1)} className="bg-ink text-cream px-6 py-3.5 rounded-full inline-flex items-center gap-2 disabled:opacity-30 disabled:cursor-not-allowed hover:bg-terracotta transition-colors">
                  Siguiente <I.ArrowRight className="w-4 h-4"/>
                </button>
              </div>
            </div>
          )}
        </main>
      );
    }

    function ReviewSubmit({ user, onDone }) {
      const [rating, setRating] = useState(0);
      const [hover, setHover] = useState(0);
      const [text, setText] = useState('');
      const [petName, setPetName] = useState('');
      const [submitted, setSubmitted] = useState(false);
      if (submitted) {
        const isFive = rating === 5;
        return (
          <main className="max-w-2xl mx-auto px-5 md:px-8 py-20 text-center animate-fade-up">
            <div className="w-20 h-20 rounded-full bg-ink text-cream flex items-center justify-center mx-auto mb-6"><I.Check className="w-10 h-10" strokeWidth={2.4}/></div>
            <h2 className="font-display text-4xl tracking-tight mb-4">¡Gracias por tu opinión!</h2>
            <p className="text-ink/65 mb-10 max-w-md mx-auto leading-relaxed">
              {isFive ? 'Tu reseña aparecerá pronto en nuestro muro público una vez verificada.' : 'Tus comentarios llegan directamente al equipo para mejorar. Lo apreciamos enormemente.'}
            </p>
            <button onClick={onDone} className="bg-ink text-cream px-7 py-3.5 rounded-full hover:bg-terracotta transition-colors">Volver al inicio</button>
          </main>
        );
      }
      return (
        <main className="max-w-2xl mx-auto px-5 md:px-8 py-16 md:py-24">
          <div className="text-xs uppercase tracking-[0.25em] text-warmbrown mb-3">Tu opinión</div>
          <h2 className="font-display text-4xl md:text-5xl tracking-tight mb-4">¿Cómo estuvo tu visita?</h2>
          <p className="text-ink/65 mb-12 leading-relaxed">Las reseñas de 5 estrellas se muestran en nuestro muro público. Las demás llegan privadas al equipo para mejorar.</p>
          <div className="mb-10">
            <label className="block text-xs uppercase tracking-[0.18em] text-warmbrown mb-4">Calificación</label>
            <div className="flex gap-2">
              {[1,2,3,4,5].map(n => (
                <button key={n} onMouseEnter={() => setHover(n)} onMouseLeave={() => setHover(0)} onClick={() => setRating(n)} className="p-1">
                  <I.Star className={`w-10 h-10 transition-all ${n <= (hover || rating) ? 'fill-terracotta text-terracotta scale-110' : 'text-ink/20'}`}/>
                </button>
              ))}
            </div>
          </div>
          <div className="mb-6">
            <label className="block text-xs uppercase tracking-[0.18em] text-warmbrown mb-2">Nombre de tu mascota</label>
            <input value={petName} onChange={e => setPetName(e.target.value)} placeholder="Ej. Bruno, French Bulldog" className="w-full bg-soft border border-ink/10 rounded-2xl px-5 py-4 focus:outline-none focus:border-ink"/>
          </div>
          <div className="mb-10">
            <label className="block text-xs uppercase tracking-[0.18em] text-warmbrown mb-2">Comentario</label>
            <textarea rows={5} value={text} onChange={e => setText(e.target.value)} placeholder="Cuéntanos cómo fue la experiencia..." className="w-full bg-soft border border-ink/10 rounded-2xl px-5 py-4 focus:outline-none focus:border-ink resize-none"/>
          </div>
          <button onClick={() => setSubmitted(true)} disabled={!rating || !text.trim()} className="bg-ink text-cream px-7 py-4 rounded-full inline-flex items-center gap-2 disabled:opacity-30 disabled:cursor-not-allowed hover:bg-terracotta transition-colors">Enviar reseña</button>
        </main>
      );
    }

    function Footer() {
      return (
        <footer className="bg-ink text-cream">
          <div className="max-w-6xl mx-auto px-5 md:px-8 py-16 md:py-20 grid md:grid-cols-12 gap-10">
            <div className="md:col-span-5">
              <div className="font-display text-4xl tracking-tight mb-3">{company.name}</div>
              <div className="text-cream/60 text-sm mb-6">{company.tagline}</div>
              <p className="text-cream/70 text-sm leading-relaxed max-w-sm">{company.description}</p>
            </div>
            <div className="md:col-span-3 md:col-start-7">
              <div className="text-xs uppercase tracking-widest text-cream/50 mb-4">Visítanos</div>
              <ul className="space-y-3 text-sm text-cream/85">
                <li className="flex items-start gap-2"><I.MapPin className="w-4 h-4 mt-0.5 text-terracotta shrink-0"/><span>{company.address}</span></li>
                {company.hours.map(h => <li key={h.day} className="flex justify-between gap-2"><span>{h.day}</span><span className="text-cream/55">{h.time}</span></li>)}
              </ul>
            </div>
            <div className="md:col-span-3">
              <div className="text-xs uppercase tracking-widest text-cream/50 mb-4">Contacto</div>
              <ul className="space-y-3 text-sm text-cream/85">
                <li className="flex items-center gap-2"><I.Phone className="w-4 h-4 text-terracotta shrink-0"/><span>{company.phone}</span></li>
                <li className="flex items-center gap-2"><I.Mail className="w-4 h-4 text-terracotta shrink-0"/><span>{company.email}</span></li>
                <li className="flex items-center gap-2"><I.Instagram className="w-4 h-4 text-terracotta shrink-0"/><span>{company.social.instagram}</span></li>
                <li className="flex items-center gap-2"><I.Facebook className="w-4 h-4 text-terracotta shrink-0"/><span>{company.social.facebook}</span></li>
              </ul>
            </div>
          </div>
          <div className="border-t border-cream/10">
            <div className="max-w-6xl mx-auto px-5 md:px-8 py-5 flex flex-wrap justify-between gap-3 text-xs text-cream/50">
              <span>© {new Date().getFullYear()} {company.name}. Hecho con cariño.</span>
              <span>Estética & cuidado profesional</span>
            </div>
          </div>
        </footer>
      );
    }

    function App() {
      const [view, setView] = useState('home');
      const [user, setUser] = useState(null);
      const [showLogin, setShowLogin] = useState(false);

      useEffect(() => {
        const saved = localStorage.getItem('ll_user');
        if (saved) { try { setUser(JSON.parse(saved)); } catch {} }
      }, []);

      function handleLogin(u) {
        setUser(u);
        if (u) localStorage.setItem('ll_user', JSON.stringify(u));
        else localStorage.removeItem('ll_user');
        setShowLogin(false);
      }

      function startBooking() {
        if (!user) { setShowLogin(true); return; }
        setView('booking');
      }
      function goReview() {
        if (!user) { setShowLogin(true); return; }
        setView('review');
      }

      return (
        <div className="min-h-screen bg-cream text-ink flex flex-col">
          <Header user={user} onLogin={() => setShowLogin(true)} onLogout={() => handleLogin(null)} onHome={() => setView('home')} onBook={startBooking}/>
          <div className="flex-1">
            {view === 'home' && <HomePage onBook={startBooking} onLeaveReview={goReview}/>}
            {view === 'booking' && <BookingFlow user={user} onDone={() => setView('home')} onCancel={() => setView('home')}/>}
            {view === 'review' && <ReviewSubmit user={user} onDone={() => setView('home')}/>}
          </div>
          <Footer/>
          {showLogin && <LoginModal onClose={() => setShowLogin(false)} onLogin={handleLogin}/>}
        </div>
      );
    }

    seedDemoBookings();
    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
